## hey emacs, this is kinda -*- sh -*- file
--cookies-from-browser=safari
--no-mtime
--no-playlist
--mark-watched
--write-auto-subs
--sub-langs="-all,..-orig"
--convert-subs=srt
--merge-output-format=mp4
--force-keyframes-at-cuts
--embed-chapters
--sponsorblock-mark=all
--fragment-retries=200
--retry-sleep=fragment:exp=1:256
--retry-sleep=extractor:linear=1:10
--paths="subtitle:~/video/subs"
--paths="temp:/tmp"
--paths="~/video"
--restrict-filenames
--output="%(title)s_[%(id|display_id|NA)s].%(ext)s"
--alias=-Q    --abort-on-unavailable-fragments
--alias=1080p --format-sort=res:1080,ext
--alias=720p  --format-sort=res:720,ext
--alias=480p  --format-sort=res:480,ext
--alias=en   "--no-write-auto-subs --write-subs --sub-langs='-all,en'"
--alias=it   "--no-write-auto-subs --write-subs --sub-langs='-all,it'"
--alias=private "--no-cookies --impersonate=Chrome-110:Windows-10"
--alias=playlist "--output=~/video/%(playlist_title)s_by_%(playlist_channel)s/%(playlist_index)02d_%(title)s_[%(id|display_id|NA)s].%(ext)s"
